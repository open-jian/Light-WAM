# @package _global_

defaults:
  - _self_
  - data: null
  - model: null
  - task: null


output_dir: ./runs/train/${now:%Y-%m-%d}_${now:%H-%M-%S}

# dataloading
batch_size: 2
num_workers: 4

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1.0e-4
warmup_ratio: 0.05
warmup_steps: null
num_epochs: 1
max_steps: null
log_every: 10
save_every: 100
eval_every: 50
eval_num_inference_steps: 10
checkpoint:
  max_to_keep: null

# offline precompute
precompute_batch_size: ${batch_size}
precompute_num_workers: ${num_workers}
precompute_tiled: false
overwrite: false
precompute_resume: false
precompute_video_only: false
precompute_storage_format: null # optional: [single_file_v1, sharded_v1, episode_packed_v1]
precompute_use_sharded_cache: false
precompute_shard_size: 128
precompute_cache_dtype: "model" # one of: [model, fp32, fp16, bf16]
precompute_timing:
  enabled: false
  sync_cuda: true
  log_every: 10

# training
gradient_accumulation_steps: 1
mixed_precision: "bf16" # one of: [no, fp16, bf16]
seed: 42
max_grad_norm: 1.0
weight_decay: 0.0
resume: null
timing_breakdown:
  enabled: false
  sync_cuda: true
train_visualization:
  enabled: false
  every: 500
  fps: 8
  tiled: false
  action_fit_enabled: false
  action_fit_num_steps: null
parameter_report:
  enabled: false
  filename: parameter_report.json

benchmark:
  enabled: false
  warmup_steps: 10
  measure_steps: 50
  output_filename: training_speed_benchmark.json
  description: null

distributed:
  debug_sync_train_step: false
  chunked_collectives:
    enabled: false
    max_bytes: 65536

# wandb
wandb:
  enabled: false
  workspace: null
  project: fast-wam
  name: train
  group: null
  mode: online

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
